services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ticket_tracker
      POSTGRES_USER: ticket_tracker
      POSTGRES_PASSWORD: dev_only_password
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  api:
    build: ./apps/api
    env_file: ./apps/api/.env
    depends_on: [postgres]
    ports: ["3000:3000"]

  web:
    build: ./apps/web
    depends_on: [api]
    ports: ["5173:5173"]

volumes:
  pgdata:
